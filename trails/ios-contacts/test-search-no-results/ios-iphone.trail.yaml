- config:
    title: 'Contacts (iOS): Search query that returns no results'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Open Contacts and search for "ZzZzNoSuchContact". Verify "No Results" is visible. Do not tap any rows.
    recording:
      tools:
      - contacts_ios_searchContacts:
          query: ZzZzNoSuchContact
          openFirstResult: false
      - assertVisibleBySelector:
          reason: After searching for a nonexistent contact, the Contacts app shows a “No Results” banner. Verify it is visible to confirm the no-results state.
          selector:
            textRegex: No Results
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: No Results
