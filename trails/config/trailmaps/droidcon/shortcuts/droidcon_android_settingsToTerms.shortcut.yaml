id: droidcon_android_settingsToTerms
description: Open the Terms & Conditions page from the Settings list.
shortcut:
  from: droidcon/android/event-settings
  to: droidcon/android/event-terms
parameters: []
tools:
  - tapOnElementBySelector:
      reason: Open Terms & Conditions
      nodeSelector:
        androidAccessibility:
          contentDescriptionRegex: "Terms.{0,5}Conditions?"
