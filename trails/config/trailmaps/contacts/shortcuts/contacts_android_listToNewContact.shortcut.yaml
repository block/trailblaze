id: contacts_android_listToNewContact
description: Tap the FAB to start a new contact.
shortcut:
  from: contacts/android/list-populated
  to: contacts/android/new-contact-editor
parameters: []
tools:
  - tapOnElementBySelector:
      reason: Open the new-contact editor
      nodeSelector:
        androidAccessibility:
          resourceIdRegex: com.android.contacts:id/floating_action_button
  - hideKeyboard: {}
