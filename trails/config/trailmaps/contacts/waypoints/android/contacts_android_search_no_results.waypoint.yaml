id: "contacts/android/search-no-results"
description: >
  Contact search with a query that matches nothing — "No contacts" message
  in place of the list.
android:
  required:
    - description: "Stop-searching back button"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.contacts:id/search_back_button"
    - description: "Clear-search button (query present)"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.contacts:id/search_close_button"
    - description: "No contacts message"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.contacts:id/totalContactsText"
          textRegex: "^No contacts$"
  forbidden:
    - description: "Any contact row"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.contacts:id/cliv_name_textview"
