id: "contacts/android/settings-sort-by-dialog"
description: >
  Sort-by radio dialog over Contacts settings — "Sort by" title with
  First name / Last name single-choice options.
android:
  required:
    - description: "Sort by dialog title"
      selector:
        androidAccessibility:
          textRegex: "^Sort by$"
          resourceIdRegex: "android:id/alertTitle"
    - description: "First name option"
      selector:
        androidAccessibility:
          textRegex: "^First name$"
          resourceIdRegex: "android:id/text1"
    - description: "Last name option"
      selector:
        androidAccessibility:
          textRegex: "^Last name$"
          resourceIdRegex: "android:id/text1"
  forbidden:
    - description: "Settings 'My info' row — visible only when no dialog covers the settings list"
      selector:
        androidAccessibility:
          textRegex: "^My info$"
