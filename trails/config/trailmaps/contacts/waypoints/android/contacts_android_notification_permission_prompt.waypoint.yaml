id: "contacts/android/notification-permission-prompt"
description: >
  System notification-permission dialog over AOSP Contacts on first launch —
  "Allow Contacts to send you notifications?" headline with ALLOW and DON'T ALLOW
  buttons. Rendered by the permission controller, so the Contacts UI behind it is
  not in the accessibility tree.
android:
  required:
    - description: "Permission question headline"
      selector:
        androidAccessibility:
          textRegex: "Allow Contacts to send you notifications\\?"
          resourceIdRegex: "com\\.android\\.permissioncontroller:id/permission_message"
    - description: "ALLOW button"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.permissioncontroller:id/permission_allow_button"
    - description: "DON'T ALLOW button"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.permissioncontroller:id/permission_deny_button"
  forbidden:
    - description: "Contacts create-FAB — would mean the dialog is dismissed and the list is showing"
      selector:
        androidAccessibility:
          resourceIdRegex: "com\\.android\\.contacts:id/floating_action_button"
