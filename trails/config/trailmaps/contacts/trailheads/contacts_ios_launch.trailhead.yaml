# Viewer-visible sidecar for the `contacts_ios_launchApp` TS tool's trailhead.
id: contacts_ios_launch
description: >
  Launch the iOS Contacts app with FORCE_RESTART and land on the top-level alphabetical
  contacts list, regardless of which screen the device is currently on.
trailhead:
  to: contacts/ios/list
parameters: []
tools:
  - contacts_ios_launchApp: {}
