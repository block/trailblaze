- config:
    title: 'Contacts: delete a contact'
    target: contacts
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
    - crud
- prompts:
  - step: Open the Contacts app and start creating a new contact
    recording:
      tools:
      - contacts_android_launchApp: {}
      - wait:
          timeToWaitInSeconds: 3
      - wait:
          timeToWaitInSeconds: 2
      - mobile_listInstalledApps: {}
      - launchApp:
          appId: com.android.contacts
          launchMode: RESUME
          reasoning: The Contacts app was recently launched, but the current screen is the launcher home (com.android.launcher3). To continue with the task to start creating a new contact, I need to explicitly resume Contacts.
      - tapOnElementBySelector:
          reason: The Contacts app is open, and the 'Create new contact' button is present. Tapping this button is the standard way to start creating a new contact.
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: com.android.contacts:id/floating_action_button
  - step: Enter first name "Casey" and last name "Trailblaze", then save the contact
    recording:
      tools:
      - clearText: {}
      - inputText:
          text: Casey
          reasoning: The first name field is currently focused ("First name" [focused]). The next step is to enter 'Casey' into this field. After entering the first name, I will proceed to fill in the last name field.
      - tapOnElementBySelector:
          reason: The first name 'Casey' has been entered. The next step is to enter the last name 'Trailblaze'. I must tap the 'Last name' field to focus it before typing.
          nodeSelector:
            androidAccessibility:
              hintTextRegex: Last name
      - inputText:
          text: Trailblaze
          reasoning: The 'Last name' field is currently focused. To continue creating the contact, I will enter 'Trailblaze' as the last name. After this, I will save the contact by tapping the 'SAVE' button.
      - tapOnElementBySelector:
          reason: Both the first name ('Casey') and last name ('Trailblaze') have been entered. The next step is to save the contact by tapping the 'SAVE' button.
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: com.android.contacts:id/editor_menu_save_button
      - assertVisibleBySelector:
          reason: The objective is to enter the first name 'Casey' and last name 'Trailblaze', then save the contact. The current screen displays the name 'Casey Trailblaze', confirming that the contact was created and saved successfully.
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: com.android.contacts:id/large_title
          expectedText: Casey Trailblaze
  - step: Delete this contact, confirming if asked
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The screen is displaying the contact details for 'Casey Trailblaze'. To delete the contact, I need to access the options menu, which is typically where the delete option is found. The 'More options' button is visible and should be tapped to reveal additional actions, including potentially 'Delete'.
          nodeSelector:
            androidAccessibility:
              contentDescriptionRegex: More options
      - tapOnElementBySelector:
          reason: The 'Delete' option is now visible in the options menu for the contact. To proceed with deleting this contact, I need to tap the 'Delete' option.
          nodeSelector:
            containsChild:
              androidAccessibility:
                textRegex: Delete
      - tapOnElementBySelector:
          reason: A confirmation dialog has appeared asking 'Delete this contact?'. To complete the objective of deleting the contact, I need to confirm the deletion by tapping the 'DELETE' button.
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: android:id/button1
  - verify: Casey Trailblaze no longer appears in the contact list
    recording:
      tools:
      - assertNotVisibleWithText:
          text: Casey Trailblaze
