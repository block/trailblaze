# The cross-platform showcase journey: ONE natural-language trail that runs on
# Android and iOS, with a photo beat that hops app boundaries (Contacts → camera
# or photo picker → crop → back to Contacts). Outside the `contacts` target only
# core tools apply — the boundary is the point, not a limitation.
#
# The photo step names the JOB and degrades gracefully per platform: an Android
# emulator has a camera (`emulated` or `virtualscene` feed), an iOS Simulator has
# none — there the library pick wins. Seed the simulator library first:
#   xcrun simctl addmedia booted <photo>.jpg
#
# Recordings are earned, not written — the committed android.trail.yaml came from:
#   trailblaze run -d android trails/contacts/create-contact-with-photo/blaze.yaml
#   trailblaze session save --title "Contacts: create a contact with a profile photo"
#
# Clean-device safe: no accounts, no sign-in. On the AOSP `default` emulator
# image the flow crosses Contacts → Camera2 → the gallery crop screen → back,
# and the saved contact is queryable:
#   adb shell content query --uri content://com.android.contacts/contacts \
#     --projection display_name:photo_uri
#
# The Android recording taps the one-time notification-permission dialog, so it
# replays against FRESH app state (what CI's just-created emulator provides).
# Re-running locally? Reset first:
#   adb shell pm clear com.android.contacts
#   adb shell pm clear com.android.providers.contacts
#
# iOS status: the photo beat is BLOCKED on iOS 26.4/26.5 Simulators — tapping
# "Photos" in the Add-Photo avatar sheet crashes the stock Contacts app
# (SwiftUI AttributeGraph SIGABRT, reproducible with two independent drivers;
# OS bug, pre-picker). Don't blaze the photo step on an iOS 26.x sim.
- config:
    title: "Contacts: create a contact with a profile photo"
    target: contacts
    tags: [crud, cross-app]
- prompts:
    - step: Open the Contacts app and start creating a new contact
    - step: Enter first name "Casey" and last name "Trailblaze"
    - step: Add the mobile number 555-0134
    - step: Add the email casey.trailblaze.demo@example.com
    - step: Add a profile photo to the contact — take a new photo if there's a camera, otherwise pick the first photo in the library
    - step: Save the contact
    - verify: The contact card for Casey Trailblaze shows the mobile number 555-0134, the email casey.trailblaze.demo@example.com, and a profile photo
