- config:
    title: 'Map micro: editor-with-text'
    target: contacts
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
    - map-micro
- prompts:
  - step: Navigate to the editor-with-text state
    recording:
      tools:
      - launchApp:
          appId: com.android.contacts
          launchMode: RESUME
      - tapOnElementBySelector:
          reason: Open the new-contact editor
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: "com.android.contacts:id/floating_action_button"
      - inputText:
          text: Casey
          reasoning: map tour
      - tapOnElementBySelector:
          reason: Focus last name
          nodeSelector:
            androidAccessibility:
              hintTextRegex: Last name
      - inputText:
          text: Trailblaze
          reasoning: map tour
