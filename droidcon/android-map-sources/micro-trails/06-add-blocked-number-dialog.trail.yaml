- config:
    title: 'Map micro: add-blocked-number-dialog'
    target: contacts
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
    - map-micro
- prompts:
  - step: Navigate to the add-blocked-number-dialog state
    recording:
      tools:
      - launchApp:
          appId: com.android.contacts
          launchMode: RESUME
      - tapOnElementBySelector:
          reason: Open the navigation drawer
          nodeSelector:
            androidAccessibility:
              contentDescriptionRegex: Open navigation drawer
      - tapOnElementBySelector:
          reason: Open Settings
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: "com.android.contacts:id/nav_settings"
      - tapOnElementWithText:
          text: Blocked numbers
      - tapOnElementBySelector:
          reason: Open add-blocked-number dialog
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: "com.android.server.telecom:id/add_blocked"
