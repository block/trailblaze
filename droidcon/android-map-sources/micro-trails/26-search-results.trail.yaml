- config:
    title: 'Map micro: search-results'
    target: contacts
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
    - map-micro
- prompts:
  - step: Navigate to the search-results state
    recording:
      tools:
      - launchApp:
          appId: com.android.contacts
          launchMode: RESUME
      - tapOnElementBySelector:
          reason: Open search
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: "com.android.contacts:id/menu_search"
      - inputText:
          text: Casey
          reasoning: map tour
