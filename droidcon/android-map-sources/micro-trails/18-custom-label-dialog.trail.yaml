- config:
    title: 'Map micro: custom-label-dialog'
    target: contacts
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
    tags:
    - map-micro
- prompts:
  - step: Navigate to the custom-label-dialog state
    recording:
      tools:
      - launchApp:
          appId: com.android.contacts
          launchMode: RESUME
      - tapOnElementBySelector:
          reason: Open the new-contact editor
          nodeSelector:
            androidAccessibility:
              resourceIdRegex: "com.android.contacts:id/floating_action_button"
      - hideKeyboard: {}
      - tapOnElementWithText:
          text: Mobile
      - tapOnElementWithText:
          text: Custom
